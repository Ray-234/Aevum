<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Aevum logo</title>
  <desc id="desc">A deep-time planet engine logo with a layered globe, orbital arc, and wordmark.</desc>
  <defs>
    <radialGradient id="planet" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#d7f7d6"/>
      <stop offset="36%" stop-color="#62b37f"/>
      <stop offset="62%" stop-color="#2a7f90"/>
      <stop offset="100%" stop-color="#11283f"/>
    </radialGradient>
    <linearGradient id="crust" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f2c56b"/>
      <stop offset="44%" stop-color="#d7763f"/>
      <stop offset="72%" stop-color="#7a496d"/>
      <stop offset="100%" stop-color="#25324d"/>
    </linearGradient>
    <linearGradient id="word" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#12263b"/>
      <stop offset="62%" stop-color="#205a68"/>
      <stop offset="100%" stop-color="#7a4f62"/>
    </linearGradient>
    <clipPath id="globeClip">
