      <path d="M58 52 L228 208" stroke="url(#crust)" stroke-width="9" opacity="0.82"/>
    </g>
    <circle cx="142" cy="130" r="82" fill="none" stroke="#10283e" stroke-width="2" opacity="0.38"/>
  </g>

  <path d="M38 139 C98 35 215 19 282 92" fill="none" stroke="#385a70" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <path d="M256 85 L281 91 L266 111" fill="none" stroke="#385a70" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
