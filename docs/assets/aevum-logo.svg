    <text x="5" y="115" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="600" letter-spacing="1.5" fill="#506070">DEEP-TIME WORLD ENGINE</text>
    <path d="M6 137 L548 137" stroke="#d7ded9" stroke-width="2"/>
    <g font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="17" fill="#66736f">
