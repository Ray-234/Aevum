      <path d="M144 121 C161 103 197 104 212 125 C224 143 201 166 178 161 C151 155 130 139 144 121 Z" fill="#c9c46b"/>
      <path d="M88 158 C109 146 129 158 142 175 C154 191 132 204 108 200 C87 196 73 175 88 158 Z" fill="#4f9b74"/>
      <path d="M164 68 C180 72 193 82 199 96" fill="none" stroke="#f0d071" stroke-width="6" stroke-linecap="round"/>
      <path d="M92 125 C116 127 139 129 160 139 C185 151 205 151 226 143" fill="none" stroke="#d8f0d5" stroke-width="3" opacity="0.62"/>
      <path d="M66 177 C88 169 110 171 131 184 C154 198 178 196 202 187" fill="none" stroke="#bde7e1" stroke-width="3" opacity="0.48"/>
