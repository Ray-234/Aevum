    </clipPath>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0a1b2d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="920" height="260" rx="32" fill="#f7faf7"/>

